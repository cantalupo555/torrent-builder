name: Build and Test

on:
  push:
    tags-ignore: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-and-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libboost-dev libtorrent-rasterbar-dev pkg-config

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: cd build && ctest --output-on-failure --no-tests=error

  build-windows:
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: amd64
            msystem: UCRT64
            prefix: mingw-w64-ucrt-x86_64
          - os: windows-11-arm
            arch: arm64
            msystem: CLANGARM64
            prefix: mingw-w64-clang-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: false
          install: >-
            git
            base-devel
            ${{ matrix.prefix }}-toolchain
            ${{ matrix.prefix }}-cmake
            ${{ matrix.prefix }}-libtorrent-rasterbar
            ${{ matrix.prefix }}-pkg-config

      - name: Configure
        shell: msys2 {0}
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -G "MSYS Makefiles"

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Test
        shell: msys2 {0}
        run: cd build && ctest --output-on-failure --no-tests=error

  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-15-intel
            arch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: brew install boost cmake libtorrent-rasterbar pkg-config

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: cd build && ctest --output-on-failure --no-tests=error
